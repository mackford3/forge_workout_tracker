{% extends 'base.html' %}
{% block title %}New Plan{% endblock %}

{% block content %}
<div class="page-header">
  <h1>NEW PLAN</h1>
  <p>Build your training structure</p>
</div>

<form method="post">
  <div class="card">
    <div class="form-group">
      <label class="form-label">Plan Name</label>
      <input class="form-control" name="name" placeholder="e.g. 8-Week Strength Block" required/>
    </div>
    <div class="form-group">
      <label class="form-label">Description</label>
      <textarea class="form-control" name="description" rows="2" placeholder="What is this plan for?"></textarea>
    </div>
  </div>

  <div class="section-header" style="margin-top:8px;">
    <h2>DAYS</h2>
    <span style="font-size:12px;color:var(--muted);">Add each training day</span>
  </div>

  <div id="days-container"></div>

  <button type="button" class="btn btn-secondary btn-full" style="margin-bottom:16px;"
    hx-get="{{ url_for('plans.htmx_plan_day_row') }}"
    hx-target="#days-container"
    hx-swap="beforeend"
    hx-on::after-request="incDay()"
    id="add-day-btn">
    + Add Day
  </button>
  <input type="hidden" id="day-index" value="0"/>

  <button type="submit" class="btn btn-primary btn-full" style="font-size:18px;padding:16px;">
    Create Plan ✓
  </button>
</form>

<script>
  let dayIdx = 0;
  function incDay() {
    dayIdx++;
    const btn = document.getElementById('add-day-btn');
    btn.setAttribute('hx-get', `{{ url_for('plans.htmx_plan_day_row') }}?index=${dayIdx}`);
    htmx.process(btn);
  }
  function removeRow(btn) { btn.closest('.set-row').remove(); }
</script>
{% endblock %}
