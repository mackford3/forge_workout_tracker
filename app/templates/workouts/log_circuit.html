{% extends 'base.html' %}
{% block title %}Log {{ 'AMRAP' if circuit_type == 'amrap' else 'Circuit' }}{% endblock %}

{% block content %}
<div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;">
  <a href="{{ url_for('workouts.history') }}" class="btn btn-secondary btn-sm">← Cancel</a>
  <div>
    <h1 style="font-size:28px;margin:0;">⚡ AMRAP</h1>
    <p style="color:var(--muted);font-size:13px;margin:2px 0 0;">As Many Rounds As Possible</p>
  </div>
</div>

<form method="post">
  <input type="hidden" name="circuit_type" value="{{ circuit_type }}"/>
  <div class="card">
    <div class="form-group">
      <label class="form-label">Session Name</label>
      <input class="form-control" name="name" placeholder="e.g. Full Body Circuit..." required/>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
      {% if circuit_type == 'amrap' %}
      <div class="form-group">
        <label class="form-label">Time Cap (MM:SS)</label>
        <input class="form-control" name="time_cap" placeholder="20:00"/>
      </div>
      <div class="form-group">
        <label class="form-label">Rounds Completed</label>
        <input class="form-control" type="number" name="rounds_completed" placeholder="0"/>
      </div>
      {% else %}
      <div class="form-group">
        <label class="form-label">Rounds Target</label>
        <input class="form-control" type="number" name="rounds_target" placeholder="3"/>
      </div>
      <div class="form-group">
        <label class="form-label">Rounds Completed</label>
        <input class="form-control" type="number" name="rounds_completed" placeholder="3"/>
      </div>
      {% endif %}
    </div>
    <div class="form-group">
      <label class="form-label">Total Time (MM:SS)</label>
      <input class="form-control" name="total_time" placeholder="25:00"/>
    </div>
    <div class="form-group">
      <label class="form-label">Date & Time</label>
      <input class="form-control" type="datetime-local" name="completed_at"/>
    </div>
  </div>

  <div class="section-header" style="margin-top:8px;">
    <h2>EXERCISES</h2>
    <div style="display:flex;gap:6px;align-items:center;">
      <span style="font-size:12px;color:var(--muted);">Unit:</span>
      <select id="global-unit" class="form-control" style="width:auto;padding:6px 10px;font-size:13px;" onchange="setUnit(this.value)">
        <option value="kg" {{ 'selected' if weight_unit=='kg' }}>kg</option>
        <option value="lbs" {{ 'selected' if weight_unit=='lbs' }}>lbs</option>
      </select>
    </div>
  </div>

  <div id="circuit-exercises-container"></div>

  <button type="button" class="btn btn-secondary btn-full" style="margin-bottom:16px;"
    hx-get="{{ url_for('workouts.htmx_circuit_exercise_row') }}"
    hx-target="#circuit-exercises-container"
    hx-swap="beforeend"
    hx-on::after-request="incEx()"
    id="add-ex-btn">
    + Add Exercise
  </button>
  <input type="hidden" id="ex-index" value="0"/>

  <div class="form-group">
    <label class="form-label">Notes</label>
    <textarea class="form-control" name="notes" rows="2" placeholder="How did it go?"></textarea>
  </div>

  <button type="submit" class="btn btn-primary btn-full" style="font-size:18px;padding:16px;">
    Save {{ 'AMRAP' if circuit_type == 'amrap' else 'Circuit' }} ✓
  </button>
</form>

<script>
  let exIdx = 0;
  function incEx() {
    exIdx++;
    const btn = document.getElementById('add-ex-btn');
    btn.setAttribute('hx-get', `{{ url_for('workouts.htmx_circuit_exercise_row') }}?index=${exIdx}`);
    htmx.process(btn);
    setUnit(document.getElementById('global-unit').value);
  }
  function setUnit(unit) { document.querySelectorAll('.unit-select').forEach(s => s.value = unit); }
  function removeRow(btn) { btn.closest('.set-row').remove(); }
</script>
{% endblock %}
