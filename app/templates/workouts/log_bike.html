{% extends 'base.html' %}
{% block title %}Log Bike{% endblock %}

{% block content %}
<div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;">
  <a href="{{ url_for('workouts.log_cardio') }}" class="btn btn-secondary btn-sm">← Back</a>
  <div>
    <h1 style="font-size:28px;margin:0;">🚴 BIKE</h1>
    <p style="color:var(--muted);font-size:13px;margin:2px 0 0;">Log distance, time or recovery ride</p>
  </div>
</div>

<form method="post">
  <div class="card">
    <div class="form-group">
      <label class="form-label">Session Name</label>
      <input class="form-control" name="name" placeholder="e.g. Morning Ride, Zone 2..." required/>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
      <div class="form-group">
        <label class="form-label">Bike Type</label>
        <select class="form-control" name="run_type" id="bike-type" onchange="updateBikeType(this.value)">
          <option value="continuous">Continuous (distance ride)</option>
          <option value="timed">Timed (ride for X minutes)</option>
          <option value="recovery">Recovery (easy ride)</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Environment</label>
        <select class="form-control" name="environment">
          <option value="indoor" {{ 'selected' if environment == 'indoor' }}>Indoor</option>
          <option value="outdoor" {{ 'selected' if environment == 'outdoor' }}>Outdoor</option>
        </select>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
      <div class="form-group">
        <label class="form-label">Date &amp; Time</label>
        <input class="form-control" type="datetime-local" name="completed_at"/>
      </div>
      <div class="form-group">
        <label class="form-label">Location</label>
        <select class="form-control" name="location">
          {% for val, label in locations %}
          <option value="{{ val }}">{{ label }}</option>
          {% endfor %}
        </select>
      </div>
    </div>
  </div>

  <div class="card" style="margin-bottom:12px;">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
      <div class="form-group" id="distance-field">
        <label class="form-label" id="dist-label">Distance (km)</label>
        <div style="display:flex;gap:4px;align-items:center;">
          <input class="form-control" type="number" step="0.001" min="0"
            name="total_distance_km" id="bike-dist-input" placeholder="0.000"/>
          <input type="hidden" name="distance_unit" id="bike-dist-unit" value="km"/>
          <button type="button" class="btn btn-secondary btn-sm" style="white-space:nowrap;padding:6px 8px;"
            onclick="toggleBikeDist()">km | mi</button>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Total Time (MM:SS)</label>
        <input class="form-control" name="total_duration" placeholder="60:00"/>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
      <div class="form-group">
        <label class="form-label">Avg Heart Rate (bpm)</label>
        <input class="form-control" type="number" name="avg_heart_rate" placeholder="Optional"/>
      </div>
      <div class="form-group">
        <label class="form-label">Calories</label>
        <input class="form-control" type="number" name="calories" placeholder="Optional"/>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Route / Notes</label>
      <textarea class="form-control" name="route_notes" rows="2" placeholder="Where did you ride?"></textarea>
    </div>
  </div>

  <div class="form-group">
    <label class="form-label">Session Notes</label>
    <textarea class="form-control" name="notes" rows="2" placeholder="How did it feel?"></textarea>
  </div>

  <button type="submit" class="btn btn-primary btn-full" style="font-size:18px;padding:16px;">
    Save Ride ✓
  </button>
</form>

<script>
  function updateBikeType(val) {
    const distField = document.getElementById('distance-field');
    distField.style.opacity = (val === 'timed') ? '0.4' : '1';
  }

  function toggleBikeDist() {
    const unit = document.getElementById('bike-dist-unit');
    const label = document.getElementById('dist-label');
    unit.value = unit.value === 'km' ? 'mi' : 'km';
    label.textContent = 'Distance (' + unit.value + ')';
  }

  document.addEventListener('DOMContentLoaded', () => {
    const dt = document.querySelector('input[type="datetime-local"]');
    if (dt && !dt.value) {
      const now = new Date();
      now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
      dt.value = now.toISOString().slice(0, 16);
    }
  });
</script>
{% endblock %}
