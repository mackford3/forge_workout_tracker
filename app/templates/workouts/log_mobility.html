{% extends 'base.html' %}
{% block title %}Log Mobility{% endblock %}

{% block content %}
<div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;">
  <a href="{{ url_for('workouts.history') }}" class="btn btn-secondary btn-sm">← Cancel</a>
  <div>
    <h1 style="font-size:28px;margin:0;">🧘 MOBILITY</h1>
    <p style="color:var(--muted);font-size:13px;margin:2px 0 0;">Yoga · Stretching · Recovery</p>
  </div>
</div>

<form method="post">
  <div class="card" style="margin-bottom:12px;">
    <div class="form-group">
      <label class="form-label">Session Name</label>
      <input class="form-control" name="name" placeholder="e.g. Morning Yoga, Hip Mobility..."/>
    </div>
    <div class="form-group">
      <label class="form-label">Type</label>
      <select class="form-control" name="mobility_type">
        <option value="yoga">Yoga</option>
        <option value="mobility_flow">Mobility Flow</option>
        <option value="foam_rolling">Foam Rolling</option>
        <option value="stretching">Stretching</option>
        <option value="mixed">Mixed</option>
        <option value="other">Other</option>
      </select>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
      <div class="form-group">
        <label class="form-label">Date &amp; Time</label>
        <input class="form-control" type="datetime-local" name="completed_at"/>
      </div>
      <div class="form-group">
        <label class="form-label">Location</label>
        <select class="form-control" name="location">
          {% for val, label in locations %}
          <option value="{{ val }}" {{ 'selected' if val == 'home' }}>{{ label }}</option>
          {% endfor %}
        </select>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Duration (min)</label>
      <input class="form-control" type="number" name="duration_minutes" placeholder="20"/>
    </div>
    <div class="form-group">
      <label class="form-label">Focus Areas</label>
      <input class="form-control" name="focus_areas" placeholder="e.g. hips / shoulders / ankles"/>
    </div>
    <div class="form-group">
      <label class="form-label">Notes</label>
      <textarea class="form-control" name="notes" rows="3" placeholder="How did it feel? Any highlights..."></textarea>
    </div>
  </div>

  <button type="submit" class="btn btn-primary btn-full" style="font-size:18px;padding:16px;">
    Save Session ✓
  </button>
</form>

<script>
  document.addEventListener('DOMContentLoaded', () => {
    const dt = document.querySelector('input[type="datetime-local"]');
    if (dt && !dt.value) {
      const now = new Date();
      now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
      dt.value = now.toISOString().slice(0, 16);
    }
  });
</script>
{% endblock %}
