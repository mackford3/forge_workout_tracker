<div class="set-row card card-sm" style="margin-bottom:8px;position:relative;">
  <button type="button" onclick="removeRow(this)"
    style="position:absolute;top:10px;right:10px;background:none;border:none;color:var(--muted);cursor:pointer;font-size:18px;">✕</button>
  <div style="font-size:11px;font-weight:600;color:var(--muted);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:8px;">Day {{ index + 1 }}</div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;">
    <div>
      <label class="form-label">Week #</label>
      <input class="form-control" type="number" name="days[{{ index }}][week]" min="1" value="1"/>
    </div>
    <div>
      <label class="form-label">Day</label>
      <select class="form-control" name="days[{{ index }}][dow]">
        {% for d in days_of_week %}
        <option value="{{ d }}">{{ d }}</option>
        {% endfor %}
      </select>
    </div>
  </div>
  <div class="form-group" style="margin-bottom:8px;">
    <label class="form-label">Day Name</label>
    <input class="form-control" name="days[{{ index }}][name]" placeholder="e.g. Push Day, Long Run..." value=""/>
  </div>
  <div class="form-group" style="margin:0;">
    <label class="form-label">Notes</label>
    <input class="form-control" name="days[{{ index }}][notes]" placeholder="What's planned for this day?"/>
  </div>
</div>
