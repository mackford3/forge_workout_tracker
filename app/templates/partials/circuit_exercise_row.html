<div class="set-row card card-sm" style="margin-bottom:8px;position:relative;">
  <button type="button" onclick="removeRow(this)"
    style="position:absolute;top:10px;right:10px;background:none;border:none;color:var(--muted);cursor:pointer;font-size:18px;">✕</button>
  <div style="font-size:11px;font-weight:600;color:var(--muted);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:8px;">Exercise {{ index + 1 }}</div>
  <div class="form-group" style="margin-bottom:8px;">
    <label class="form-label">Exercise</label>
    <div data-exercise-wrap>
      <input type="text" class="form-control ex-search-input"
             placeholder="Search exercises..." autocomplete="off"/>
      <input type="hidden" class="exercise-id-input"
             name="exercises[{{ index }}][exercise_id]" required/>
    </div>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;">
    <div>
      <label class="form-label">Reps</label>
      <input class="form-control" type="number" name="exercises[{{ index }}][reps]" placeholder="10"/>
    </div>
    <div>
      <label class="form-label">Weight</label>
      <input class="form-control" type="number" step="0.5" name="exercises[{{ index }}][weight]" placeholder="0"/>
    </div>
    <div>
      <label class="form-label">Unit</label>
      <select class="form-control unit-select" name="exercises[{{ index }}][unit]">
        <option value="kg">kg</option>
        <option value="lbs">lbs</option>
      </select>
    </div>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px;">
    <div>
      <label class="form-label">Duration (MM:SS)</label>
      <input class="form-control" name="exercises[{{ index }}][duration]" placeholder="0:30"/>
    </div>
    <div>
      <label class="form-label">Distance (m)</label>
      <input class="form-control" type="number" name="exercises[{{ index }}][distance_m]" placeholder="200"/>
    </div>
  </div>
  <div style="margin-top:8px;">
    <label class="form-label">Notes</label>
    <input class="form-control" name="exercises[{{ index }}][notes]" placeholder="Optional"/>
  </div>
</div>
