<div class="set-row card card-sm" style="margin-bottom:8px;position:relative;">
  <button type="button" onclick="this.closest('.set-row').remove()"
    style="position:absolute;top:10px;right:10px;background:none;border:none;color:var(--muted);cursor:pointer;font-size:18px;">✕</button>
  <div style="font-size:11px;font-weight:600;color:var(--muted);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:8px;">Exercise {{ index + 1 }}</div>
  <div class="form-group">
    <label class="form-label">Exercise Name</label>
    <input class="form-control" name="exercises[{{ index }}][name]" placeholder="e.g. Burpee" required/>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;">
    <div>
      <label class="form-label">Reps</label>
      <input class="form-control" type="number" name="exercises[{{ index }}][reps]" placeholder="10"/>
    </div>
    <div>
      <label class="form-label">Weight (lbs)</label>
      <input class="form-control" type="number" step="0.5" name="exercises[{{ index }}][weight_lbs]" placeholder="0"/>
    </div>
    <div>
      <label class="form-label">Distance (m)</label>
      <input class="form-control" type="number" name="exercises[{{ index }}][distance_m]" placeholder="0"/>
    </div>
  </div>
  <div class="form-group" style="margin-top:8px;">
    <label class="form-label">Notes</label>
    <input class="form-control" name="exercises[{{ index }}][notes]" placeholder="Optional"/>
  </div>
</div>
