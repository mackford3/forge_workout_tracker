<div class="tmpl-ex-row set-row card card-sm" style="margin-bottom:8px;position:relative;">
  <button type="button" onclick="this.closest('.tmpl-ex-row').remove()"
    style="position:absolute;top:10px;right:10px;background:none;border:none;color:var(--muted);cursor:pointer;font-size:18px;">✕</button>
  <div style="font-size:11px;font-weight:600;color:var(--muted);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:6px;">Exercise {{ index + 1 }}</div>
  <input class="form-control" name="exercises[{{ index }}]"
         placeholder="e.g. Bench Press 4x8-10" autocomplete="off"/>
</div>
