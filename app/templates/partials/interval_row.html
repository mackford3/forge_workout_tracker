<div class="set-row card card-sm" style="margin-bottom:8px;position:relative;">
  <button type="button" onclick="removeRow(this)"
    style="position:absolute;top:10px;right:10px;background:none;border:none;color:var(--muted);cursor:pointer;font-size:18px;">✕</button>
  <div style="font-size:11px;font-weight:600;color:var(--muted);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:8px;">Interval {{ index + 1 }}</div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
    <div class="form-group" style="margin:0;">
      <label class="form-label">Distance (km)</label>
      <input class="form-control" type="number" step="0.001" min="0" name="intervals[{{ index }}][distance_km]" placeholder="0.400"/>
    </div>
    <div class="form-group" style="margin:0;">
      <label class="form-label">Time (MM:SS)</label>
      <input class="form-control" name="intervals[{{ index }}][duration]" placeholder="2:00"/>
    </div>
  </div>
  <div class="form-group" style="margin-top:8px;margin-bottom:0;">
    <label class="form-label">Notes</label>
    <input class="form-control" name="intervals[{{ index }}][notes]" placeholder="e.g. felt strong"/>
  </div>
</div>
