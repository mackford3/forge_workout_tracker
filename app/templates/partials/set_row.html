<div class="set-row card card-sm" style="margin-bottom:8px;position:relative;">
  <button type="button" onclick="removeRow(this)"
    style="position:absolute;top:10px;right:10px;background:none;border:none;color:var(--muted);cursor:pointer;font-size:18px;line-height:1;">✕</button>

  <div class="form-group" style="margin-bottom:10px;">
    <label class="form-label">Exercise</label>
    <select class="form-control" name="sets[{{ index }}][exercise_id]" required>
      <option value="">Select exercise...</option>
      {% for ex in exercises %}
        <option value="{{ ex.id }}">{{ ex.name }}{% if ex.muscle_group %} ({{ ex.muscle_group }}){% endif %}</option>
      {% endfor %}
    </select>
  </div>

  <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;align-items:end;">
    <div>
      <label class="form-label">Set #</label>
      <input class="form-control" type="number" name="sets[{{ index }}][set_number]" min="1" value="{{ index + 1 }}" style="text-align:center;"/>
    </div>
    <div>
      <label class="form-label">Weight</label>
      <input class="form-control" type="number" step="0.5" min="0" name="sets[{{ index }}][weight]" placeholder="0" style="text-align:center;"/>
    </div>
    <div>
      <label class="form-label">Unit</label>
      <select class="form-control unit-select" name="sets[{{ index }}][unit]">
        <option value="kg">kg</option>
        <option value="lbs">lbs</option>
      </select>
    </div>
    <div>
      <label class="form-label">Reps</label>
      <input class="form-control" type="number" min="0" name="sets[{{ index }}][reps]" placeholder="0" style="text-align:center;"/>
    </div>
  </div>

  <div style="display:grid;grid-template-columns:1fr 2fr;gap:8px;margin-top:8px;">
    <div>
      <label class="form-label">RPE</label>
      <input class="form-control" type="number" step="0.5" min="1" max="10" name="sets[{{ index }}][rpe]" placeholder="1-10"/>
    </div>
    <div>
      <label class="form-label">Notes</label>
      <input class="form-control" name="sets[{{ index }}][notes]" placeholder="Optional notes"/>
    </div>
  </div>
</div>
