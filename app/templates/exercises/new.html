{% extends 'base.html' %}
{% block title %}Add Exercise{% endblock %}

{% block content %}
<div class="page-header">
  <h1>ADD EXERCISE</h1>
</div>

<form method="post">
  <div class="card">
    <div class="form-group">
      <label class="form-label">Name</label>
      <input class="form-control" name="name" placeholder="Exercise name" required/>
    </div>
    <div class="form-group">
      <label class="form-label">Muscle Group</label>
      <input class="form-control" name="muscle_group" placeholder="e.g. Chest, Legs..."/>
    </div>
    <div class="form-group">
      <label class="form-label">Category</label>
      <select class="form-control" name="category">
        <option value="strength">Strength</option>
        <option value="cardio">Cardio</option>
        <option value="plyometric">Plyometric</option>
      </select>
    </div>
  </div>
  <button type="submit" class="btn btn-primary btn-full" style="font-size:18px;padding:16px;">Add Exercise ✓</button>
</form>
{% endblock %}
