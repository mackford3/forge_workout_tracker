{% extends 'base.html' %}
{% block title %}Start — {{ day.name }}{% endblock %}

{% block content %}
<div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;">
  <a href="{{ url_for('program.week', program_id=program.id, week_num=day.week_number) }}" class="btn btn-secondary btn-sm">← Back</a>
  <h1 style="font-size:24px;margin:0;">{{ day.name }}</h1>
</div>

<div style="font-size:12px;color:var(--muted);margin-bottom:16px;">
  Week {{ day.week_number }} · {{ day.day_of_week }} · {{ program.name }}
</div>

<form method="post" action="{{ url_for('workouts.log_strength') }}" id="strength-form">
  <!-- Hidden field to link back to program day after save -->
  <input type="hidden" name="program_day_id" value="{{ day.id }}"/>

  <!-- Session info -->
  <div class="card" style="margin-bottom:10px;">
    <div class="form-group">
      <label class="form-label">Session Name</label>
      <input class="form-control" name="name" value="{{ day.name }}" required/>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
      <div class="form-group">
        <label class="form-label">Location</label>
        <select class="form-control" name="location">
          <option value="gym">🏋️ Gym</option>
          <option value="home">🏠 Home</option>
          <option value="outdoor">🌳 Outdoor</option>
          <option value="other">📍 Other</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Date & Time</label>
        <input class="form-control" type="datetime-local" name="completed_at"/>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px;">
      <div class="form-group"><label class="form-label">Duration (min)</label>
        <input class="form-control" type="number" name="duration_minutes" placeholder="60"/></div>
      <div class="form-group"><label class="form-label">Calories</label>
        <input class="form-control" type="number" name="calories" placeholder="400"/></div>
      <div class="form-group"><label class="form-label">Avg BPM</label>
        <input class="form-control" type="number" name="avg_bpm" placeholder="145"/></div>
      <div class="form-group"><label class="form-label">Session RPE</label>
        <input class="form-control" type="number" step="0.5" min="1" max="10" name="session_rpe" placeholder="7"/></div>
    </div>
  </div>

  <!-- Unit selector -->
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
    <h2 style="font-size:18px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;margin:0;">EXERCISES</h2>
    <div style="display:flex;gap:6px;align-items:center;">
      <span style="font-size:12px;color:var(--muted);">Unit:</span>
      <select id="global-unit" class="form-control" style="width:auto;padding:6px 10px;font-size:13px;" onchange="setGlobalUnit(this.value)">
        <option value="lbs" {{ 'selected' if weight_unit=='lbs' }}>lbs</option>
        <option value="kg"  {{ 'selected' if weight_unit=='kg' }}>kg</option>
      </select>
    </div>
  </div>

  <div id="exercises-container"></div>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;">
    <button type="button" class="btn btn-secondary btn-full" style="border-style:dashed;" onclick="addExercise()">+ Strength</button>
    <button type="button" class="btn btn-secondary btn-full" style="border-style:dashed;color:var(--run);border-color:color-mix(in srgb,var(--run) 40%,transparent);" onclick="addCardioSet()">+ Cardio</button>
  </div>

  <button type="submit" class="btn btn-primary btn-full" style="font-size:18px;padding:16px;">
    Save Workout ✓
  </button>
</form>

<script>
const allExercises = [
  {% for ex in all_exercises %}
  { id: {{ ex.id }}, name: "{{ ex.name }}", group: "{{ ex.muscle_group or '' }}" },
  {% endfor %}
];

// Pre-matched exercises from program day
const programExercises = [
  {% for m in matched %}
  { name: {{ m.name | tojson }}, exercise_id: {{ m.exercise.id if m.exercise else 'null' }} },
  {% endfor %}
];

let globalSetIndex    = 0;
let globalCardioIndex = 0;
let exerciseCount     = 0;

// ── Exercise combobox helpers ──────────────────────────────
function buildExDropdown(query) {
  const q = query.toLowerCase().trim();
  const filtered = q
    ? allExercises.filter(ex => ex.name.toLowerCase().includes(q) || ex.group.toLowerCase().includes(q))
    : allExercises;
  if (!filtered.length) return '<div style="padding:10px 14px;color:var(--muted);font-size:13px;">No matches</div>';
  let html = '';
  let curGroup = null;
  filtered.forEach(ex => {
    if (ex.group !== curGroup) {
      html += `<div style="padding:5px 14px 3px;font-size:10px;font-weight:700;letter-spacing:0.08em;color:var(--muted);text-transform:uppercase;background:var(--surface);position:sticky;top:0;">${ex.group || 'Other'}</div>`;
      curGroup = ex.group;
    }
    html += `<div class="ex-opt" data-id="${ex.id}" data-name="${ex.name.replace(/"/g,'&quot;')}"
      style="padding:10px 14px;cursor:pointer;font-size:14px;"
      onmouseover="this.style.background='var(--surface)'" onmouseout="this.style.background=''">${ex.name}</div>`;
  });
  return html;
}

function showExDrop(input, exIdx) {
  const drop = document.getElementById(`ex-drop-${exIdx}`);
  drop.innerHTML = buildExDropdown(input.value);
  drop.style.display = 'block';
}

function filterExDrop(input, exIdx) {
  const drop = document.getElementById(`ex-drop-${exIdx}`);
  drop.innerHTML = buildExDropdown(input.value);
  drop.style.display = 'block';
  const block = input.closest('.exercise-block');
  block.querySelector('.exercise-id-input').value = '';
  syncExerciseToSets(parseInt(block.dataset.exIdx));
}

function hideExDrop(exIdx) {
  setTimeout(() => {
    const drop = document.getElementById(`ex-drop-${exIdx}`);
    if (drop) drop.style.display = 'none';
  }, 180);
}

function pickExercise(dropEl, exIdx) {
  const opt = dropEl.closest('.ex-opt');
  if (!opt) return;
  const id   = opt.dataset.id;
  const name = opt.dataset.name;
  const block = document.querySelector(`.exercise-block[data-ex-idx="${exIdx}"]`);
  block.querySelector('.ex-search-input').value  = name;
  block.querySelector('.exercise-id-input').value = id;
  block.style.borderColor = '';
  block.querySelector('.ex-search-input').style.borderColor = '';
  block.querySelector('.ex-validate-msg')?.remove();
  document.getElementById(`ex-drop-${exIdx}`).style.display = 'none';
  syncExerciseToSets(exIdx);
  loadHistory(id, exIdx);
}

function moveBlock(btn, dir) {
  const block = btn.closest('.exercise-block');
  const container = document.getElementById('exercises-container');
  const blocks = [...container.querySelectorAll(':scope > .exercise-block')];
  const idx = blocks.indexOf(block);
  if (dir === -1 && idx > 0) container.insertBefore(block, blocks[idx - 1]);
  else if (dir === 1 && idx < blocks.length - 1) container.insertBefore(blocks[idx + 1], block);
}

function addExercise(selectedExerciseId = '', labelHint = '') {
  const exIdx = exerciseCount++;
  const unit  = document.getElementById('global-unit').value;
  const matchFailed = labelHint && !selectedExerciseId;
  const selectedName = selectedExerciseId
    ? (allExercises.find(e => e.id == selectedExerciseId)?.name || '') : '';

  const block = document.createElement('div');
  block.className = 'exercise-block card';
  block.dataset.exIdx = exIdx;
  block.style.cssText = `margin-bottom:10px;position:relative;${matchFailed ? 'border-color:#ff9800;' : ''}`;

  block.innerHTML = `
    <div style="display:flex;align-items:center;gap:6px;position:absolute;top:10px;right:10px;z-index:1;">
      <button type="button" onclick="moveBlock(this,-1)"
        style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;line-height:1;padding:2px 4px;" title="Move up">↑</button>
      <button type="button" onclick="moveBlock(this,1)"
        style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;line-height:1;padding:2px 4px;" title="Move down">↓</button>
      <button type="button" onclick="this.closest('.exercise-block').remove()"
        style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:18px;line-height:1;">✕</button>
    </div>
    ${labelHint ? `<div style="font-size:10px;font-family:'DM Mono',monospace;margin-bottom:6px;${matchFailed ? 'color:#ff9800;' : 'color:var(--muted);'}">Program: ${labelHint}${matchFailed ? ' ⚠ not found — select manually' : ''}</div>` : ''}
    <div class="form-group" style="margin-bottom:8px;padding-right:80px;">
      <label class="form-label">Exercise</label>
      <div style="position:relative;">
        <input type="text" class="form-control ex-search-input" value="${selectedName}"
          placeholder="Type to search exercise..."
          autocomplete="off"
          oninput="filterExDrop(this, ${exIdx})"
          onfocus="showExDrop(this, ${exIdx})"
          onblur="hideExDrop(${exIdx})"/>
        <input type="hidden" class="exercise-id-input" value="${selectedExerciseId || ''}"/>
        <div id="ex-drop-${exIdx}" onmousedown="event.preventDefault()" onclick="pickExercise(event.target, ${exIdx})"
          style="display:none;position:absolute;top:calc(100% + 2px);left:0;right:0;z-index:200;
                 background:var(--surface2);border:1px solid var(--border);border-radius:8px;
                 max-height:220px;overflow-y:auto;box-shadow:0 4px 16px rgba(0,0,0,0.4);"></div>
      </div>
    </div>
    <div id="history-${exIdx}" style="margin-bottom:4px;"></div>
    <div class="sets-row" id="sets-row-${exIdx}"
      style="display:flex;gap:8px;overflow-x:auto;padding-bottom:8px;align-items:flex-end;"></div>

    <button type="button" onclick="addSet(${exIdx})" class="btn btn-secondary btn-full"
      style="margin-top:8px;border-style:dashed;font-size:13px;">+ Add Set</button>
  `;
  document.getElementById('exercises-container').appendChild(block);
  addSet(exIdx);
  if (selectedExerciseId) loadHistory(selectedExerciseId, exIdx);
}

async function loadHistory(exerciseId, exIdx) {
  const container = document.getElementById(`history-${exIdx}`);
  if (!exerciseId) { container.innerHTML = ''; return; }
  container.innerHTML = '<div style="font-size:11px;color:var(--muted);padding:4px 0;">Loading...</div>';
  const res  = await fetch(`/workouts/htmx/exercise-history?exercise_id=${exerciseId}`);
  const html = await res.text();
  container.innerHTML = html;
  const prMatch = html.match(/data-last-weight="([\d.]+)"/);
  if (prMatch) {
    const row = document.getElementById(`sets-row-${exIdx}`);
    row.querySelectorAll('input[name*="[weight]"]').forEach(inp => {
      if (!inp.value) inp.value = prMatch[1];
    });
  }
}

function addSet(exIdx) {
  const idx      = globalSetIndex++;
  const unit     = document.getElementById('global-unit').value;
  const row      = document.getElementById(`sets-row-${exIdx}`);
  const setCards = row.querySelectorAll('.set-card');
  const setNum   = setCards.length + 1;
  let prevWeight = '';
  if (setCards.length > 0) {
    const lw = setCards[setCards.length - 1].querySelector('input[name*="[weight]"]');
    if (lw) prevWeight = lw.value;
  }
  const card = document.createElement('div');
  card.className = 'set-card';
  card.style.cssText = 'background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px;min-width:110px;flex-shrink:0;position:relative;';
  card.innerHTML = `
    <button type="button" onclick="this.closest('.set-card').remove()"
      style="position:absolute;top:6px;right:6px;background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;">✕</button>
    <div style="font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;text-align:center;">Set ${setNum}</div>
    <input type="hidden" name="sets[${idx}][set_number]" value="${setNum}"/>
    <div style="margin-bottom:6px;"><label class="form-label" style="font-size:10px;">Weight</label>
      <input class="form-control" type="number" step="0.5" min="0" name="sets[${idx}][weight]"
        placeholder="0" value="${prevWeight}" style="text-align:center;padding:6px 4px;font-size:16px;font-weight:600;"/></div>
    <div style="margin-bottom:6px;">
      <select class="form-control unit-select" name="sets[${idx}][unit]" style="padding:4px 6px;font-size:12px;">
        <option value="lbs" ${unit=='lbs'?'selected':''}>lbs</option>
        <option value="kg"  ${unit=='kg' ?'selected':''}>kg</option>
      </select></div>
    <div style="margin-bottom:6px;"><label class="form-label" style="font-size:10px;">Reps</label>
      <input class="form-control" type="number" min="0" name="sets[${idx}][reps]" placeholder="0"
        style="text-align:center;padding:6px 4px;font-size:16px;font-weight:600;color:var(--accent);"/></div>
    <div><label class="form-label" style="font-size:10px;">RPE</label>
      <input class="form-control" type="number" step="0.5" min="1" max="10" name="sets[${idx}][rpe]"
        placeholder="—" style="text-align:center;padding:6px 4px;font-size:13px;"/></div>
    <input type="hidden" class="set-exercise-ref" data-ex-idx="${exIdx}" name="sets[${idx}][exercise_id]" value=""/>
  `;
  row.appendChild(card);
  syncExerciseToSets(exIdx);
  card.querySelector('input[name*="[reps]"]').focus();
}

function syncExerciseToSets(exIdx) {
  const block = document.querySelector(`.exercise-block[data-ex-idx="${exIdx}"]`);
  if (!block) return;
  const idInput = block.querySelector('.exercise-id-input');
  block.querySelectorAll('.set-exercise-ref').forEach(r => r.value = idInput ? idInput.value : '');
}

function setGlobalUnit(unit) {
  document.querySelectorAll('.unit-select').forEach(s => s.value = unit);
}

// ── Form submit validation ─────────────────────────────────
document.getElementById('strength-form').addEventListener('submit', function(e) {
  let invalid = false;
  document.querySelectorAll('.exercise-block').forEach(block => {
    const text = block.querySelector('.ex-search-input')?.value.trim();
    const id   = block.querySelector('.exercise-id-input')?.value;
    if (text && !id) {
      block.style.borderColor = '#ff4466';
      block.querySelector('.ex-search-input').style.borderColor = '#ff4466';
      if (!block.querySelector('.ex-validate-msg')) {
        const msg = document.createElement('div');
        msg.className = 'ex-validate-msg';
        msg.style.cssText = 'font-size:11px;color:#ff4466;margin-top:4px;';
        msg.textContent = 'Select an exercise from the list';
        block.querySelector('.ex-search-input').after(msg);
      }
      invalid = true;
    }
  });
  if (invalid) e.preventDefault();
});

// Auto-populate exercises from program day
programExercises.forEach(pe => {
  addExercise(pe.exercise_id || '', pe.name);
});
if (programExercises.length === 0) addExercise();
</script>
{% endblock %}
